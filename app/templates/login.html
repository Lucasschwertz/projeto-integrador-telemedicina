{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5 col-md-7">
    <div class="section-card fade-up">
      <h2 class="mb-2">Acesse sua conta</h2>
      <p class="text-muted">Entre com seu email e senha.</p>

      <form method="POST" action="{{ url_for('auth.login') }}" class="row g-3">
        <div class="col-12">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="voce@email.com" required>
        </div>
        <div class="col-12">
          <label class="form-label">Senha</label>
          <input type="password" name="senha" class="form-control" placeholder="Sua senha" required>
        </div>
        <div class="col-12 d-grid">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-sign-in-alt me-1"></i>Entrar
          </button>
        </div>
      </form>

      <div class="mt-3 text-center">
        <small class="text-muted">Nao tem conta?</small>
        <a href="{{ url_for('auth.cadastro') }}" class="ms-1">Cadastre-se</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
