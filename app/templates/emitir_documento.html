{% extends 'base.html' %}
{% block title %}Emitir documento medico{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="section-card fade-up">
      <h2 class="mb-3">Emitir documento medico</h2>
      <form method="POST" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Paciente</label>
          <input type="text" name="paciente" class="form-control" placeholder="Nome do paciente" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Tipo</label>
          <select name="tipo" class="form-select" required>
            <option value="">Selecione o tipo</option>
            <option value="Laudo Medico">Laudo medico</option>
            <option value="Receita">Receita</option>
            <option value="Atestado">Atestado</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Conteudo</label>
          <textarea name="conteudo" rows="8" class="form-control" placeholder="Descreva o documento" required></textarea>
        </div>
        <div class="col-12 d-flex justify-content-end gap-2">
          <a href="{{ url_for('dashboard.dashboard_medico') }}" class="btn btn-outline-secondary">Voltar</a>
          <button type="submit" class="btn btn-primary">Emitir documento</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
