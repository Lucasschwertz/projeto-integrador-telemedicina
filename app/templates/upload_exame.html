{% extends 'base.html' %}
{% block title %}Upload de exame{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="section-card fade-up">
      <h2 class="mb-3">Upload de exame</h2>
      <form method="POST" enctype="multipart/form-data" class="row g-3">
        <div class="col-12">
          <label class="form-label">Paciente</label>
          <input type="text" name="paciente" class="form-control" placeholder="Nome do paciente" required>
        </div>
        <div class="col-12">
          <label class="form-label">Arquivo</label>
          <input type="file" name="arquivo" class="form-control" required>
        </div>
        <div class="col-12 d-flex justify-content-end gap-2">
          <a href="{{ url_for('dashboard.dashboard_medico') }}" class="btn btn-outline-secondary">Voltar</a>
          <button type="submit" class="btn btn-primary">Enviar exame</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
