{% extends 'base.html' %}
{% block title %}Emitir atestado medico{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="section-card fade-up">
      <h2 class="mb-3">Emitir atestado medico</h2>
      <form method="POST" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Paciente</label>
          <input type="text" name="paciente" class="form-control" placeholder="Nome do paciente" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Dias de afastamento</label>
          <input type="number" name="dias" class="form-control" min="1" required>
        </div>
        <div class="col-12">
          <label class="form-label">Observacoes</label>
          <textarea name="observacoes" rows="6" class="form-control" placeholder="Descreva observacoes adicionais"></textarea>
        </div>
        <div class="col-12 d-flex justify-content-end gap-2">
          <a href="{{ url_for('dashboard.dashboard_medico') }}" class="btn btn-outline-secondary">Voltar</a>
          <button type="submit" class="btn btn-primary">Emitir atestado</button>
        </div>
      </form>

      {% if arquivo_gerado %}
        <div class="mt-4 d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2">
          <span class="text-muted">Atestado gerado: {{ arquivo_gerado }}</span>
          <a href="{{ url_for('documentos.download_arquivo', nome_arquivo=arquivo_gerado) }}" class="btn btn-outline-primary">
            <i class="fas fa-download me-1"></i>Baixar atestado
          </a>
        </div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
