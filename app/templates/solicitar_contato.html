{% extends 'base.html' %}

{% block title %}Solicitar contato{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="section-card fade-up">
      <h2 class="mb-3">Solicitar contato</h2>
      <p class="text-muted">Envie sua mensagem e retornaremos o mais rapido possivel.</p>

      <form method="POST" class="row g-3">
        <div class="col-md-6">
          <label for="nome" class="form-label">Nome</label>
          <input type="text" class="form-control" id="nome" name="nome" required>
        </div>
        <div class="col-md-6">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="col-12">
          <label for="mensagem" class="form-label">Mensagem</label>
          <textarea class="form-control" id="mensagem" name="mensagem" rows="5" required></textarea>
        </div>
        <div class="col-12 d-flex justify-content-end gap-2">
          <a href="{{ url_for('home.home') }}" class="btn btn-outline-secondary">Voltar</a>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-paper-plane me-1"></i>Enviar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
